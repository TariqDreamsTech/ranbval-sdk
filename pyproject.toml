[tool.poetry]
name = "ranbval-sdk"
version = "0.4.3"
description = "Ranbval: load .ranbval* config, decrypt vault tokens, optional telemetry (BYO HTTP/vendor SDK)"
authors = ["Ahsan Tariq", "Hussnain Tariq", "Sundas Tariq"]
readme = "README.md"
build = "build.py"

[tool.poetry.dependencies]
python = "^3.10"
cryptography = "^42.0.0"
certifi = ">=2024.0.0"

[build-system]
requires = ["poetry-core>=1.0.0", "Cython>=3.0.0", "setuptools"]
build-backend = "poetry.core.masonry.api"
