[tool.poetry]
name = "ranbval-sdk"
version = "0.7.0"
description = "Keep API secrets out of plaintext config: layered .ranbval* env files, decrypt vault tokens only when used, optional plan/subscription enforcement, optional usage telemetry—minimal deps, your own HTTP/SDK stack."
authors = ["Ahsan Tariq", "Hussnain Tariq", "Sundas Tariq"]
readme = "README.md"
build = "build.py"

[tool.poetry.dependencies]
python = "^3.10"
cryptography = "^42.0.0"
certifi = ">=2024.0.0"

[build-system]
requires = ["poetry-core>=1.0.0", "Cython>=3.0.0", "setuptools"]
build-backend = "poetry.core.masonry.api"
